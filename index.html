<!DOCTYPE html>
<html>
<head>
<title>Food Order Website</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ff5733;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#222;
text-align:center;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
}

nav a:hover{
color:yellow;
}

.container{
padding:30px;
text-align:center;
}

.food{
display:inline-block;
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.food img{
width:200px;
height:150px;
border-radius:10px;
}

button{
background:#ff5733;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e74c3c;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>
</head>

<body>

<header>
<h1>Online Food Ordering Website</h1>
<p>Delicious Food Anytime</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">Order</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<h2>Popular Foods</h2>

<div class="food">
<img src="burger1.jpg">
<h3>Burger</h3>
<p>Price: ₹120</p>
<button>Order Now</button>
</div>

<div class="food">
<img src="pizza.jpg">
<h3>Pizza</h3>
<p>Price: ₹250</p>
<button>Order Now</button>
</div>

<div class="food">
<img src="frizes.jpg">
<h3>French Fries</h3>
<p>Price: ₹90</p>
<button>Order Now</button>
</div>

</div>

<footer>
<p>© 2026 Online Food Order Website</p>
</footer>

</body>
</html>
